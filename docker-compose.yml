version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: reviewslot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: bookingslot
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reviewslot_backend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/bookingslot
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-hemaswarupbande5@gmail.com}
      OTP_EXPIRY_MINUTES: 5
      MAX_OTP_REQUESTS: 5
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend/.env:/app/backend/.env:ro
    restart: unless-stopped
    networks:
      - reviewslot-network

  nginx:
    image: nginx:alpine
    container_name: reviewslot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - reviewslot-network

volumes:
  mongo_data:
  mongo_config:

networks:
  reviewslot-network:
    driver: bridge
